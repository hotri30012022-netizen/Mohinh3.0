<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">

    <meta
      name="viewport"
      content="
        width=device-width,
        initial-scale=1.0,
        minimum-scale=1.0,
        maximum-scale=1.0
      "
    >

    <title>WebAR Triceratop - AR.js</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

    <!-- AR.js -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">

    <a-scene
      embedded
      vr-mode-ui="enabled: false"

      renderer="
        logarithmicDepthBuffer: true;
        colorManagement: true;
      "

      arjs="
        sourceType: webcam;
        debugUIEnabled: false;
      "
    >

      <!-- ===================== -->
      <!-- ASSETS -->
      <!-- ===================== -->

      <a-assets>

        <!-- File GLB -->
        <a-asset-item
          id="model-glb"
          src="./assets/triceratops_dinosaur.glb">
        </a-asset-item>

      </a-assets>


      <!-- ===================== -->
      <!-- MARKER -->
      <!-- ===================== -->

      <a-marker preset="hiro">

        <!-- Model GLB -->
        <a-gltf-model
          src="#model-glb"

          position="0 0 0"

          scale="0.5 0.5 0.5"

          rotation="0 0 0"

          animation="
            property: rotation;
            to: 0 360 0;
            loop: true;
            dur: 8000;
            easing: linear;
          "
        >
        </a-gltf-model>

      </a-marker>


      <!-- ===================== -->
      <!-- CAMERA -->
      <!-- ===================== -->

      <a-entity camera></a-entity>

    </a-scene>

  </body>
</html>
