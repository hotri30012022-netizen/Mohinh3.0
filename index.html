<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>AR Triceratops</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>

<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false;"
>

  <!-- MODEL -->
  <a-assets>

    <a-asset-item
      id="dino"
      src="./triceratops_dinosaur.glb">
    </a-asset-item>

  </a-assets>

  <!-- LIGHT -->
  <a-entity
    light="type: ambient; intensity: 2">
  </a-entity>

  <!-- MARKER -->
  <a-marker preset="hiro">

    <a-entity
      gltf-model="#dino"

      position="0 0.5 0"

      scale="1 1 1"

      rotation="0 0 0"

      animation="
        property: rotation;
        to: 0 360 0;
        loop: true;
        dur: 8000;
        easing: linear;
      "
    >
    </a-entity>

  </a-marker>

  <!-- CAMERA -->
  <a-entity camera></a-entity>

</a-scene>

</body>
</html>
