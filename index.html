<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0,
      user-scalable=no
    "
  >

  <title>AR Triceratops</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>

    html,
    body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: transparent;
    }

  </style>
</head>

<body>

<a-scene

  vr-mode-ui="enabled: false"

  renderer="
    antialias: true;
    alpha: true;
  "

  arjs="
    sourceType: webcam;
    debugUIEnabled: false;
  "
>

  <!-- MODEL -->

  <a-assets>

    <a-asset-item
      id="dino"
      src="./triceratops_dinosaur.glb">
    </a-asset-item>

  </a-assets>


  <!-- LIGHT -->

  <a-entity
    light="
      type: ambient;
      intensity: 2
    ">
  </a-entity>

  <a-entity
    light="
      type: directional;
      intensity: 2
    "
    position="1 1 1">
  </a-entity>


  <!-- MARKER -->

  <a-marker preset="hiro">

    <a-entity

      gltf-model="#dino"

      position="0 0.1 0"

      scale="0.35 0.35 0.35"

      rotation="0 0 0"

      animation="
        property: rotation;
        to: 0 360 0;
        loop: true;
        dur: 10000;
        easing: linear;
      "
    >
    </a-entity>

  </a-marker>


  <!-- CAMERA -->

  <a-entity camera></a-entity>

</a-scene>

</body>
</html>
