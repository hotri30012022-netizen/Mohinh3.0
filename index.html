<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>WebAR Triceratops - AR.js</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true;"
    arjs="sourceType: webcam; debugUIEnabled: false;"
  >

    <!-- Load file GLB -->
    <a-assets>
      <a-asset-item
        id="model"
        src="./assets/triceratops_dinosaur.glb">
      </a-asset-item>
    </a-assets>

    <!-- Marker Hiro -->
    <a-marker preset="hiro">

      <!-- GLB Model -->
      <a-entity
        gltf-model="#model"

        position="0 0 0"

        scale="0.5 0.5 0.5"

        rotation="0 0 0"

        animation="
          property: rotation;
          to: 0 360 0;
          loop: true;
          dur: 8000;
          easing: linear;
        "
      >
      </a-entity>

    </a-marker>

    <!-- Camera -->
    <a-entity camera></a-entity>

  </a-scene>

</body>
</html>
